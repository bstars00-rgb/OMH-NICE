<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OMH Partner Risk Gate</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar no-print">
    <div class="brand">
      <h1>OMH Partner Risk Gate</h1>
      <p>파트너 거래 리스크 평가 플랫폼</p>
    </div>
    <nav class="nav" id="nav">
      <a data-view="dashboard"><span class="ico">▦</span> 대시보드</a>
      <a data-view="companies"><span class="ico">▤</span> 업체 목록</a>
      <a data-view="settings"><span class="ico">⚙</span> 설정(가중치)</a>
    </nav>
    <div class="foot">
      MVP 프로토타입 · 데이터는 브라우저에 저장됩니다<br>
      <span id="foot-count"></span>
    </div>
  </aside>
  <main class="main">
    <div class="topbar no-print">
      <div>
        <h2 id="page-title">대시보드</h2>
        <div class="sub" id="page-sub">신규 B2B/TMC 파트너 리스크 표준 평가</div>
      </div>
      <div class="row-actions" id="top-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
