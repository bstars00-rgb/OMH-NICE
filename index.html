<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>오마이나이스 · OMH-NICE</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar no-print">
    <div class="brand">
      <h1 id="brand-title">오마이나이스</h1>
      <p id="brand-sub">OMH-NICE · 파트너 거래 리스크 평가</p>
      <div id="lang-toggle" style="margin-top:9px;font-size:12px;display:flex;gap:8px;align-items:center">
        <button type="button" data-lang="ko" style="background:none;border:0;padding:0;cursor:pointer;color:inherit;font:inherit">한국어</button>
        <span style="opacity:.4">·</span>
        <button type="button" data-lang="en" style="background:none;border:0;padding:0;cursor:pointer;color:inherit;font:inherit">EN</button>
      </div>
    </div>
    <nav class="nav" id="nav">
      <a data-view="dashboard"><span class="ico">▦</span> <span data-navlabel>대시보드</span></a>
      <a data-view="companies"><span class="ico">▤</span> <span data-navlabel>업체 목록</span></a>
      <a data-view="settings"><span class="ico">⚙</span> <span data-navlabel>설정(가중치)</span></a>
    </nav>
    <div class="foot">
      <span id="foot-note">MVP 프로토타입 · 데이터는 브라우저에 저장됩니다</span><br>
      <span id="foot-count"></span>
    </div>
  </aside>
  <main class="main">
    <div class="topbar no-print">
      <div>
        <h2 id="page-title">대시보드</h2>
        <div class="sub" id="page-sub">신규 B2B/TMC 파트너 리스크 표준 평가</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="row-actions" id="top-actions"></div>
        <button class="btn primary" id="manual-btn" title="매뉴얼">📖 <span id="manual-btn-label">매뉴얼</span></button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>
<div id="manual-modal" class="modal-overlay no-print" style="display:none">
  <div class="modal-card">
    <div class="modal-head">
      <span id="manual-title">📖 오마이나이스 사용 매뉴얼</span>
      <button class="btn sm" id="manual-close" aria-label="close">✕</button>
    </div>
    <div class="modal-body" id="manual-body"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
